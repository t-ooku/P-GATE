name: Project GATE CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run all regression tests
        run: npm test
      - name: Build single-file GAS bundle
        run: npm run build
      - name: Verify generated bundle is reproducible
        run: git diff --exit-code -- dist/Project_GATE_Complete.gs
